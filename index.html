<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>የእኔ መጀመሪያ ገጽ</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            color: #f1c40f;
        }
        /* ለበተኑ (Button) የተሰጠ ውበት */
        .my-button {
            display: inline-block;
            background-color: #e74c3c; /* ቀይ ቀለም */
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        /* ምስሉ እንዳይበላሽ የሚያደርግ */
        img {
            max-width: 80%;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>እንኳን ደህና መጡ!</h1>
    <p>ይህ በAcode የሰራሁት የመጀመሪያው ዌብሳይቴ ነው።</p>

    <br>
    <img src="profile-pic.jpg" alt="My Profile Picture" />
    <br><br>

    <a href="https://t.me/bishoftumedrestutakwa" target="_blank" class="my-button">ወደ እኔ ቴሌግራም ይግቡ</a>
<hr style="margin: 40px 0; border: 1px solid #e74c3c;">

<div style="background-color: #34495e; max-width: 85%; margin: 20px auto; padding: 20px; border-radius: 10px; text-align: left;">
    <h2 style="color: #f1c40f; text-align: center;">የደረሶች አዲስ መመዝገቢያ ፎርም</h2>
    
    <form>
        <label style="display: block; margin-top: 10px; color: white;">የተማሪው ሙሉ ስም፦</label>
        <input type="text" placeholder="እባክዎ ስም ያስገቡ" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none;">

        <label style="display: block; margin-top: 15px; color: white;">የሚከታተሉት የደርስ አይነት፦</label>
        <select style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none;">
            <option>ቁርአን (ሂፍዝ)</option>
            <option>ቃኢዳ ኑራንያ</option>
            <option>አቂዳ</option>
            <option>ፊቅህ</option>
            <option>ሀዲስ</option>
        </select>

        <label style="display: block; margin-top: 15px; color: white;">የወላጅ ስልክ ቁጥር፦</label>
        <input type="tel" placeholder="09..." style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none;">

        <button type="button" style="background-color: #e74c3c; color: white; border: none; padding: 12px 20px; margin-top: 20px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;">ተማሪውን መዝግብ</button>
    </form>
</div>

</body>
</html>
